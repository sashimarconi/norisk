            if (visible.length > 0) {

            // Close button
            h('button', {
              onClick: () => setShowDrawer(false),
              className: 'absolute right-3 top-3 z-10 rounded-full bg-gray-100 p-1.5 hover:bg-gray-200 transition-colors'
            }, h(Icon, { name: 'X', className: 'h-5 w-5 text-gray-600' })),
            
            // Header com produto - FIXED
            h('div', { className: 'shrink-0 px-4 pt-2 pb-3 flex items-start gap-3 border-b border-gray-100' },
              // Imagem com borda
              h('div', { className: 'relative shrink-0 w-20 h-20 rounded-lg overflow-hidden border border-gray-200' },
                h('img', { src: selectedVariationImage, alt: currentProduct.title, className: 'w-full h-full object-cover' })
              ),
              
              // Info do produto - usa preço da variação selecionada
              h('div', { className: 'flex-1 min-w-0' },
                // Calcular desconto baseado no preço da variação
                (() => {
                  const drawerDiscount = variationPrices.originalPrice > variationPrices.price 
                    ? Math.round(((variationPrices.originalPrice - variationPrices.price) / variationPrices.originalPrice) * 100)
                    : discountPercentage;
                  return h('div', null,
                    // Price line com badge de desconto
                    h('div', { className: 'flex items-center gap-2 flex-wrap' },
                      drawerDiscount > 0 && h('span', { className: 'bg-[#FE2C55] text-white text-xs font-bold px-1.5 py-0.5 rounded' }, '-' + drawerDiscount + '%'),
                      h('span', { className: 'text-xl font-bold text-[#FE2C55]' }, 'R$ ' + variationPrices.price.toFixed(2).replace('.', ','))
                    ),
                    // Original price crossed out
                    h('p', { className: 'text-sm text-gray-400 line-through mt-0.5' }, 'R$ ' + variationPrices.originalPrice.toFixed(2).replace('.', ','))
                  );
                })(),
                // Selected variations text
                h('p', { className: 'text-sm text-gray-600 mt-1' }, 
                  Object.values(selectedVariations).length > 0 
                    ? Object.values(selectedVariations).join(', ')
                    : (currentProduct.variations && currentProduct.variations.length ? 'Selecione as opções' : 'Padrão')
                )
              )
            ),
            
            // Variations area - SCROLLABLE
            h('div', { className: 'flex-1 overflow-y-auto px-4 py-4 text-gray-900' },
              currentProduct.variations && currentProduct.variations.length > 0 && currentProduct.variations.map(variation => {
                const hasImages = variation.options.some(opt => opt.image);
                
                return h('div', { key: variation.id, className: 'mb-5' },
                  h('h3', { className: 'font-medium text-sm mb-3 text-gray-900' }, variation.title),
                  
                  hasImages ? 
                    // Options with images
                    h('div', { className: 'flex flex-wrap gap-2' },
                      variation.options.map((opt, i) =>
                        h('button', {
                          key: i,
                          onClick: () => {
                            setSelectedVariations(prev => ({ ...prev, [variation.id]: opt.label }));
                            if (opt.image) {
                              setSelectedVariationImage(opt.image);
                              // Scroll carousel to variation image
                              if (emblaApi && displayImages) {
                                const imageIndex = displayImages.findIndex(img => img === opt.image);
                                if (imageIndex !== -1) {
                                  emblaApi.scrollTo(imageIndex);
                                }
                              }
                            }
                          },
                          className: 'flex flex-col items-center p-2 rounded border transition-colors ' + 
                            (selectedVariations[variation.id] === opt.label ? 'border-gray-900' : 'border-gray-200 hover:border-gray-400')
                        },
                          opt.image && h('img', { src: opt.image, alt: opt.label, className: 'w-14 h-14 object-cover rounded mb-1' }),
                          h('span', { className: 'text-[11px] font-medium text-center text-gray-700 uppercase' }, opt.label)
                        )
                      )
                    )
                  :
                    // Options without images - pill buttons
                    h('div', { className: 'flex flex-wrap gap-2' },
                      variation.options.map((opt, i) =>
                        h('button', {
                          key: i,
                          onClick: () => {
                            setSelectedVariations(prev => ({ ...prev, [variation.id]: opt.label }));
                          },
                          className: 'px-4 py-2 rounded border text-sm font-medium transition-colors ' + 
                            (selectedVariations[variation.id] === opt.label 
                              ? 'border-[#FE2C55] text-[#FE2C55] bg-white' 
                              : 'border-gray-200 text-gray-700 hover:border-gray-400')
                        }, opt.label)
                      )
                    )
                );
              })
            ),
            
            // Footer with Quantity + Action Button - FIXED
            h('div', { className: 'shrink-0 border-t border-gray-200 px-4 py-4 bg-white' },
              // Quantity selector - inline layout
              h('div', { className: 'flex items-center justify-between mb-4' },
                h('span', { className: 'font-medium text-sm text-gray-900' }, 'Quantidade'),
                h('div', { className: 'flex items-center border border-gray-200 rounded' },
                  h('button', {
                    onClick: () => setQuantity(Math.max(1, quantity - 1)),
                    disabled: quantity <= 1,
                    className: 'w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-gray-50 disabled:opacity-40'
                  }, '-'),
                  h('span', { className: 'w-10 text-center font-medium text-gray-900' }, quantity),
                  h('button', {
                    onClick: () => setQuantity(quantity + 1),
                    className: 'w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-gray-50'
                  }, '+')
                )
              ),
              
              // Bottom action button
              h('button', {
                onClick: () => {
                  const useInternal = true;
                  
                  if (drawerMode === 'addToCart') {
                    handleAddToCart();
                  } else {
                    // Buy now mode
                    if (useInternal) {
                      // Checkout interno: salva no cart e vai pro checkout
                      const prices = getVariationPrice(); // Usar preço da variação selecionada
                      const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
                      cartItems.push({ 
                        productId: currentProduct.id || Date.now().toString(),
                        title: currentProduct.title,
                        mainImage: selectedVariationImage,
                        price: prices.price,
                        originalPrice: prices.originalPrice,
                        quantity: quantity,
                        variations: selectedVariations,
                        selected: true
                      });
                      localStorage.setItem('cartItems', JSON.stringify(cartItems));
                      setShowDrawer(false);
                      window.location.href = isViewingRecommendation ? '../checkout.html' : 'checkout.html';
                    } else if (currentProduct.externalCheckoutUrl) {
                      const url = currentProduct.externalCheckoutUrl.startsWith('http') 
                        ? currentProduct.externalCheckoutUrl 
                        : 'https://' + currentProduct.externalCheckoutUrl;
                      window.location.href = url;
                    }
                  }
                },
                className: 'w-full bg-[#FE2C55] text-white font-semibold py-3 text-base rounded-lg hover:bg-[#E91E4C] transition-colors'
              }, drawerMode === 'addToCart' ? 'Adicionar ao carrinho' : 'Comprar agora')
            )
          )
        )
      );
    };
    
    // Render app com tratamento de erros
    try {
      const root = createRoot(document.getElementById('root'));
      root.render(h(ProductPreview, { product: window.__PRODUCT_DATA__ }));
    } catch (error) {
      console.error('Erro ao renderizar:', error);
      document.getElementById('root').innerHTML = '<div style="padding: 20px; text-align: center;"><h2>Erro ao carregar página</h2><p>Verifique o console para mais detalhes.</p></div>';
    }
    
    
</script>

</body>
</html>
