  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #F5F5F5;
      min-height: 100vh;
    }
    
    #root {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      background: #F5F5F5;
    }
    
    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        padding: 20px 0;
        background-color: #F5F5F5;
      }
      
      #root {
        max-width: 480px;
        box-shadow: 0 0 30px rgba(0,0,0,0.15);
        background: #F5F5F5;
      }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid transparent;
      border-top-color: #FE2C55;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    #refresh-warning-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    .refresh-warning-popup {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      text-align: center;
      margin: 16px;
    }
    
    .refresh-warning-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .refresh-warning-popup h3 {
      color: #111827;
      margin: 0 0 12px 0;
      font-size: 20px;
    }
    
    .refresh-warning-popup p {
      color: #6B7280;
      margin: 0 0 8px 0;
      font-size: 14px;
    }
    
    .refresh-warning-popup p.small {
      font-size: 12px;
      color: #9CA3AF;
    }
    
    .refresh-warning-popup button {
      background: #FE2C55;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;

<body>
  

  <div id="root">
    <div id="loading" style="background-color: #F5F5F5; min-height: 100vh;">
      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-3" style="background-color: #FFFFFF;">
        <button onclick="window.location.href='checkout.html'" class="p-1">
          <img src="assets/back-arrow.png" alt="Voltar" class="h-5 w-auto" style="object-fit: contain;" draggable="false" />
        </button>
        <span class="font-medium" style="color: #111827;">Código do pagamento</span>
        <div style="width: 24px;"></div>
      </div>
      <!-- Loading content -->
      <div class="flex flex-col items-center justify-center p-4" style="padding-top: 120px;">
        <div class="spinner"></div>
        <p class="mt-4" style="color: #6B7280;">Gerando pagamento...</p>
      </div>
    </div>
    <div id="payment-content" style="display: none;"></div>
    <div id="error-content" style="display: none;"></div>
  </div>
  
  <script>
    const PUBLIC_KEY = '';
    const SECRET_KEY = '';
    const GATEWAY = 'nitro';
    const PRODUCT_HASH = 'wbnbtesqcd';
    const OFFER_HASH = '';
    const UTMIFY_API_TOKEN = 'Y77kEBGbLzdwFD5zB44hiHH5O5KPPeVA4DrZ';
    const TIKTOK_PIXEL_ID = 'D4VDCQRC77UFV71PKSSG';
    const PIXEL_TYPE = 'tiktokAds';
    const TRACK_COMPLETE_PAYMENT = true;
    const UPSELL_URL = 'http://importscap.shop/dev/up1';
    
    // Pegar valor do URL
    const urlParams = new URLSearchParams(window.location.search);
    const totalAmount = parseFloat(urlParams.get('amount') || '0');
    
    // Timer de 30 minutos
    let timeLeft = 30 * 60;
    let timerInterval;
    let statusInterval;
    let paymentId = null;
    let paymentPending = true;

    // Cache do PIX para sobreviver a refresh
    const PIX_CACHE_KEY = 'pix_payment_cache_v1';

    function getNavigationTypeSafe() {
      try {
        const navEntries = performance.getEntriesByType && performance.getEntriesByType('navigation');
        return navEntries && navEntries[0] && navEntries[0].type ? navEntries[0].type : null;
      } catch (e) {
        return null;
      }
    }

    function loadPixCache() {
      try {
        const raw = sessionStorage.getItem(PIX_CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function savePixCache(pixCode, qrCodeUrl) {
      try {
        if (!paymentId || !pixCode) return;
        const expiresAt = Date.now() + (timeLeft * 1000);
        sessionStorage.setItem(PIX_CACHE_KEY, JSON.stringify({
          paymentId: paymentId,
          pixCode: pixCode,
          qrCodeUrl: qrCodeUrl,
          amount: totalAmount,
          expiresAt: expiresAt
        }));
      } catch (e) {
        // ignore
      }
    }

    function clearPixCache() {
      try {
        sessionStorage.removeItem(PIX_CACHE_KEY);
      } catch (e) {
        // ignore
      }
    }

    // Handler para prevenir refresh/saída
    function beforeUnloadHandler(e) {
      if (paymentPending) {
        e.preventDefault();
        e.returnValue = 'Você tem um pagamento PIX pendente. Se sair, precisará gerar um novo código. Deseja realmente sair?';
        return e.returnValue;
      }
    }
    
    // Adicionar listener ao carregar
    window.addEventListener('beforeunload', beforeUnloadHandler);
    window.onbeforeunload = beforeUnloadHandler;
    
    // Interceptar teclas de refresh (F5, Ctrl+R, Cmd+R)
    document.addEventListener('keydown', function(e) {
      if (paymentPending) {
        const key = (e.key || '').toString();
        if (key === 'F5' || ((e.ctrlKey || e.metaKey) && key.toLowerCase() === 'r')) {
          e.preventDefault();
          showRefreshWarning();
          return false;
        }
      }
    });
    
    function showRefreshWarning(title, message, subMessage) {
      if (document.getElementById('refresh-warning-overlay')) return;
      
      const overlay = document.createElement('div');
      overlay.id = 'refresh-warning-overlay';
      overlay.innerHTML = `
        <div class="refresh-warning-popup">
          <div class="refresh-warning-icon">⚠️</div>
          <h3>${title || 'Aguarde o pagamento!'}</h3>
          <p>${message || 'Não é possível atualizar a página enquanto o pagamento estiver pendente.'}</p>
          <p class="small">${subMessage || 'Após efetuar o PIX, aguarde a confirmação automática.'}</p>
          <button onclick="closeRefreshWarning()">Entendi</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }
    
    function closeRefreshWarning() {
      const overlay = document.getElementById('refresh-warning-overlay');
      if (overlay) overlay.remove();
    }
    
    
    // Function to notify Utmify about sale status
    async function notifyUtmify(saleStatus) {
      if (!UTMIFY_API_TOKEN || PIXEL_TYPE !== 'utmify') return;
      
      try {
        const addressData = JSON.parse(localStorage.getItem('checkoutAddress') || '{}');
        const cpf = localStorage.getItem('checkoutCpf') || '';
        const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        const productName = cartItems[0]?.title || 'Produto';
        const productId = 'PROD_' + Date.now();
        
        await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/utmify-notify-sale', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            apiToken: UTMIFY_API_TOKEN,
            orderId: paymentId || 'order_' + Date.now(),
            status: saleStatus,
            amount: totalAmount,
            productName: productName,
            productId: productId,
            customer: {
              name: addressData.nome || '',
              email: addressData.email || '',
              phone: addressData.telefone || '',
              document: cpf
            },
            utmParams: {
              utm_source: urlParams.get('utm_source') || '',
              utm_medium: urlParams.get('utm_medium') || '',
              utm_campaign: urlParams.get('utm_campaign') || '',
              utm_content: urlParams.get('utm_content') || '',
              utm_term: urlParams.get('utm_term') || ''
            }
          })
        });
        console.log('[PIX] Utmify notified:', saleStatus);
      } catch (error) {
        console.error('[PIX] Error notifying Utmify:', error);
      }
    }
    
    // Function to fire TikTok pixel event
    function fireTikTokPixelEvent(eventName) {
      if (!TIKTOK_PIXEL_ID || PIXEL_TYPE !== 'tiktokAds' || !TRACK_COMPLETE_PAYMENT) return;
      
      try {
        if (window.ttq) {
          window.ttq.track(eventName);
          console.log('[PIX] TikTok pixel event fired:', eventName);
        }
      } catch (error) {
        console.error('[PIX] Error firing TikTok pixel:', error);
      }
    }
    
    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      return hours.toString().padStart(2, '0') + ':' + mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
    }
    
    function updateTimer() {
      const timerEl = document.getElementById('countdown-timer');
      if (timerEl) {
        timerEl.textContent = formatTime(timeLeft);
      }
      timeLeft--;
      if (timeLeft < 0) {
        clearInterval(timerInterval);
        showError('Tempo expirado. Por favor, tente novamente.');
      }
    }
    
    function showError(message) {
      paymentPending = false;
      window.removeEventListener('beforeunload', beforeUnloadHandler);
      window.onbeforeunload = null;
      clearPixCache();
      
      document.getElementById('loading').style.display = 'none';
      document.getElementById('payment-content').style.display = 'none';
      document.getElementById('error-content').style.display = 'block';
      document.getElementById('error-content').innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-screen p-4 text-center" style="background-color: #F5F5F5;">
          <p style="color: #EF4444;">Erro ao gerar pagamento</p>
          <p class="mt-2 text-sm" style="color: #6B7280;">${message}</p>
          <button onclick="window.location.href='checkout.html'" class="mt-4 px-6 py-2 rounded-lg" style="background-color: #FE2C55; color: #FFFFFF;">
            Tentar novamente
          </button>
        </div>
      `;
    }
    
    function showSuccess() {
      paymentPending = false;
      window.removeEventListener('beforeunload', beforeUnloadHandler);
      window.onbeforeunload = null;
      clearPixCache();
      
      clearInterval(timerInterval);
      clearInterval(statusInterval);
      
      
      // Fire TikTok pixel CompletePayment event
      fireTikTokPixelEvent('CompletePayment');
      
      // Notify Utmify about approved payment
      notifyUtmify('approved');
      
      // Limpar carrinho
      localStorage.removeItem('cartItems');
      
      // Redirect to upsell URL if configured, otherwise show thank you page
      if (UPSELL_URL && UPSELL_URL.trim() !== '') {
        let redirectUrl = UPSELL_URL.trim();
        if (!redirectUrl.startsWith('http://') && !redirectUrl.startsWith('https://')) {
          redirectUrl = 'https://' + redirectUrl;
        }
        window.location.href = redirectUrl;
        return;
      }
      
      // Show default thank you page
      document.getElementById('payment-content').innerHTML = `
        <div class="flex flex-col items-center justify-center py-16 px-4">
          <div class="w-20 h-20 rounded-full flex items-center justify-center mb-6" style="background-color: #10B981;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2 class="text-2xl font-bold mb-2" style="color: #111827;">Pagamento Confirmado!</h2>
          <p class="text-center mb-6" style="color: #6B7280;">Obrigado pela sua compra. Seu pedido foi processado com sucesso.</p>
          <button onclick="window.location.href='index.html'" class="px-8 py-3 rounded-lg font-medium" style="background-color: #FE2C55; color: #FFFFFF;">
            Voltar à loja
          </button>
        </div>
      `;
    }
    
    function renderPaymentScreen(pixCode, qrCodeUrl) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('payment-content').style.display = 'block';
      savePixCache(pixCode, qrCodeUrl);
      
      document.getElementById('payment-content').innerHTML = `
        <div style="background-color: #F5F5F5; min-height: 100vh; padding-bottom: 20px;">
          <!-- Header -->
          <div class="flex items-center justify-between px-4 py-3" style="background-color: #FFFFFF;">
            <button onclick="window.location.href='checkout.html'" class="p-1">
              <img src="assets/back-arrow.png" alt="Voltar" class="h-5 w-auto" style="object-fit: contain;" draggable="false" />
            </button>
            <span class="font-medium" style="color: #111827;">Código do pagamento</span>
            <div style="width: 24px;"></div>
          </div>
          
          <!-- Info Section -->
          <div class="px-4 pt-4 pb-3 flex items-start justify-between">
            <div>
              <p class="text-lg font-medium" style="color: #111827;">Aguardando o pagamento</p>
              <p class="text-2xl font-bold mt-1" style="color: #111827;">R$ ${totalAmount.toFixed(2).replace('.', ',')}</p>
              <div class="flex items-center gap-2 mt-2">
                <span class="text-sm" style="color: #6B7280;">Vence em</span>
                <span class="flex items-center gap-1 px-2 py-0.5 rounded text-sm font-medium" style="background-color: #EF4444; color: #FFFFFF;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke-width="2"/>
                    <path stroke-width="2" d="M12 6v6l4 2"/>
                  </svg>
                  <span id="countdown-timer">${formatTime(timeLeft)}</span>
                </span>
              </div>
            </div>
            <!-- Orange circle icon -->
            <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: #FB923C;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
              </svg>
            </div>
          </div>

          <!-- PIX Card -->
          <div class="mx-4 mb-4 rounded-xl overflow-hidden shadow-sm" style="background-color: #FFFFFF;">
            <!-- Pix Header -->
            <div class="flex items-center gap-2 px-4 py-3" style="border-bottom: 1px solid #E5E7EB;">
              <img 
                src="assets/pix-icon.png" 
                alt="Pix" 
                class="object-contain"
                style="width: 24px; height: 24px; user-select: none; pointer-events: none;"
                draggable="false"
              />
              <span class="font-medium" style="color: #111827;">Pix</span>
            </div>

            <!-- QR Code -->
            <div class="flex justify-center py-6">
              <img src="${qrCodeUrl}" alt="QR Code PIX" class="w-40 h-40" />
            </div>

            <!-- PIX Code -->
            <div class="px-4 pb-4">
              <p class="text-xs break-all text-center leading-relaxed" style="color: #6B7280; word-break: break-all;">${pixCode}</p>
            </div>

            <!-- Copy Button -->
            <div class="px-4 pb-4">
              <button onclick="copyPixCode('${pixCode}')" class="w-full py-3.5 rounded-lg font-medium text-base" style="background-color: #FE2C55; color: #FFFFFF;">
                Copiar código Pix
              </button>
            </div>
          </div>

          <!-- Info text -->
          <p class="px-4 pb-3 text-sm" style="color: #6B7280;">
            Após o pagamento, seu pedido será processado imediatamente.
          </p>

          <!-- Ver pedido button - usando link que abre em nova aba para não perder o PIX atual -->
          <div class="px-4 pb-4">
            <a href="checkout.html" target="_blank" rel="noopener" class="block w-full py-3 rounded-lg font-medium border text-center" style="background-color: #FFFFFF; border-color: #E5E7EB; color: #111827; text-decoration: none;">
              Ver pedido
            </a>
          </div>
        </div>
      `;
      
      // Iniciar timer
      timerInterval = setInterval(updateTimer, 1000);
    }
    
    function copyPixCode(code) {
      navigator.clipboard.writeText(code).then(() => {
        alert('Código PIX copiado!');
      }).catch(() => {
        // Fallback para navegadores antigos
        const textarea = document.createElement('textarea');
        textarea.value = code;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('Código PIX copiado!');
      });
    }
    
    async function checkPaymentStatus() {
      if (!paymentId) return;
      
      try {
        if (GATEWAY === 'nitro') {
          const response = await fetch('/api/nitro-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId: paymentId })
          });

          const data = await response.json();
          if (!response.ok || data.success === false) {
            throw new Error((data && data.message) || 'Erro ao consultar status Nitro');
          }

          const status = ((data && data.data && data.data.status) || '').toLowerCase();
          console.log('Nitro status:', status);

          if (status === 'pago' || status === 'paid' || status === 'approved') {
            showSuccess();
          } else if (status === 'cancelado' || status === 'canceled' || status === 'cancelled' || status === 'rejected' || status === 'failed') {
            showError('Pagamento não aprovado. Por favor, tente novamente.');
          }
          return;
        }

        if (GATEWAY === 'sigmapay') {
          // SigmaPay uses Edge Function
          const response = await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/sigmapay-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, apiToken: SECRET_KEY })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('SigmaPay status:', data.status);
            if (data.status === 'approved') {
              showSuccess();
            } else if (data.status === 'rejected') {
              showError('Pagamento não aprovado. Por favor, tente novamente.');
            }
          }
          return;
        }
        
        if (GATEWAY === 'beehive') {
          // Beehive uses Edge Function
          const response = await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/beehive-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, secretKey: SECRET_KEY })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('Beehive status:', data.status);
            if (data.status === 'approved') {
              showSuccess();
            } else if (data.status === 'rejected') {
              showError('Pagamento não aprovado. Por favor, tente novamente.');
            }
          }
          return;
        }
        
        if (GATEWAY === 'bestfy') {
          // Bestfy uses Edge Function
          const response = await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/bestfy-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, secretKey: SECRET_KEY })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('Bestfy status:', data.status);
            if (data.status === 'approved') {
              showSuccess();
            } else if (data.status === 'rejected') {
              showError('Pagamento não aprovado. Por favor, tente novamente.');
            }
          }
          return;
        }
        
        if (GATEWAY === 'appmax') {
          // Appmax uses Edge Function
          const response = await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/appmax-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, accessToken: SECRET_KEY })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('Appmax status:', data.status);
            if (data.status === 'approved') {
              showSuccess();
            } else if (data.status === 'rejected') {
              showError('Pagamento não aprovado. Por favor, tente novamente.');
            }
          }
          return;
        }
        
        // FreePay uses Edge Function
        if (GATEWAY === 'freepay') {
          const response = await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/freepay-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, publicKey: PUBLIC_KEY, secretKey: SECRET_KEY })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('FreePay status:', data.status);
            if (data.status === 'approved') {
              showSuccess();
            } else if (data.status === 'rejected') {
              showError('Pagamento não aprovado. Por favor, tente novamente.');
            }
          }
          return;
        }
        
        // TitansHub uses Edge Function
        if (GATEWAY === 'titanshub') {
          const response = await fetch('https://qpnojbfmthfkorggbqkd.supabase.co/functions/v1/titanshub-check-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, publicKey: PUBLIC_KEY, secretKey: SECRET_KEY })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('TitansHub status:', data.status);
            if (data.status === 'approved') {
              showSuccess();
            } else if (data.status === 'rejected') {
              showError('Pagamento não aprovado. Por favor, tente novamente.');
            }
          }
          return;

        // Validate email - must contain @ symbol
        const customerEmail = addressData.email || '';
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(customerEmail)) {
          showError('E-mail inválido. Por favor, volte ao checkout e corrija seu e-mail.');
          return;

    function tryRestoreFromCache() {
      const cached = loadPixCache();
      if (!cached) return false;

      if (!cached.paymentId || !cached.pixCode || typeof cached.expiresAt !== 'number') {
        clearPixCache();
        return false;
      }

      if (cached.amount !== totalAmount) {
        return false;
      }

      if (Date.now() > cached.expiresAt) {
        clearPixCache();
        return false;
      }

      paymentId = cached.paymentId;
      timeLeft = Math.max(0, Math.floor((cached.expiresAt - Date.now()) / 1000));

      renderPaymentScreen(cached.pixCode, cached.qrCodeUrl || '');
      notifyUtmify('pending');
      statusInterval = setInterval(checkPaymentStatus, 3000);

      // Se foi um reload (toolbar/atalho), avisar e manter o mesmo PIX
      if (getNavigationTypeSafe() === 'reload') {
        showRefreshWarning(
          'Página atualizada',
          'Você atualizou esta página durante o pagamento.',
          'Não atualize novamente até concluir o pagamento.'
        );
      }

      return true;
    }

    function bootstrapPixFlow() {
      if (!tryRestoreFromCache()) {
        createPayment();
      }
    }

    // Iniciar quando a página carregar
    document.addEventListener('DOMContentLoaded', bootstrapPixFlow);
